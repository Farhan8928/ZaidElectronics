# Rebuilds the site on Vercel once a day so scripts/fetch-rating.mjs pulls the
# current Google rating/review count into the page + schema.
#
# One-time setup:
#   1. Vercel → Project → Settings → Git → Deploy Hooks → create hook
#      (name: daily-rating, branch: main) → copy the URL.
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      New repository secret: VERCEL_DEPLOY_HOOK_URL = that URL.
name: Daily redeploy (refresh Google rating)

on:
  schedule:
    - cron: '30 3 * * *' # 03:30 UTC = 09:00 IST, before the shop opens
  workflow_dispatch: {} # allows manual "Run workflow" button too

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret not set — skipping."
            exit 0
          fi
          curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered."
